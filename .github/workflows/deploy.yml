# feature/hospital-plastic-surgery 브랜치 push 시 서버 자동 배포
#
# GitHub Secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY: 서버 접속용 private key 전체 (-----BEGIN ... ~ -----END ... 포함)
#
name: Deploy

on:
  push:
    branches:
      - feature/hospital-plastic-surgery

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 15.164.59.178 >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@15.164.59.178 "cd /home/ubuntu/mono && git fetch origin && git reset --hard origin/feature/hospital-plastic-surgery && npm run migrate && npm run build && pm2 restart mono"
