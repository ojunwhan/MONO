<!DOCTYPE html>
<html lang="ko" translate="no">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Mr. O</title>
    <meta
      name="description"
      content="MONO - AI 실시간 통역 메신저. 앱 설치 없이 QR 스캔만으로 외국인과 바로 대화하세요. 99개 언어 지원."
    />
    <meta
      name="keywords"
      content="AI통역, 실시간번역, 통역앱, 다국어메신저, QR통역, MONO, 외국인소통"
    />
    <meta property="og:title" content="MONO - AI 실시간 통역 메신저" />
    <meta
      property="og:description"
      content="앱 설치 없이 QR 스캔만으로 외국인과 바로 대화. 99개 언어 실시간 양방향 통역."
    />
    <meta property="og:url" content="https://lingora.chat" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MONO - AI 실시간 통역 메신저" />
    <meta
      name="twitter:description"
      content="앱 설치 없이 QR 스캔만으로 외국인과 바로 대화. 99개 언어 실시간 양방향 통역."
    />

    <!-- ✅ PWA manifest & theme-color 추가 -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MONO" />
    <meta name="theme-color" content="#4A7BF7" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    />

    <!-- ✅ 크롬 번역 팝업 차단 -->
    <meta name="google" content="notranslate" />
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ✅ 초기 언어/부트 스크립트 -->
    <script type="module">
      // 1) 크롬 자동번역 억제 & html lang 지정
      (function(){
        const cand = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
        document.documentElement.setAttribute('lang', (cand||'en').toLowerCase());
        document.documentElement.setAttribute('translate','no');
        window.__PREF_LANG__ = cand; // socket.js에서 사용
      })();

      // 2) Legacy socket boot (guarded): newer socket module may not expose this API.
      import('/src/socket.js')
        .then(mod => {
          if (typeof mod?.bootRoomAndRegister === 'function') {
            mod.bootRoomAndRegister();
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
